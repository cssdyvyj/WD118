<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="bg-texture"></div>

    <header>
        <div class="header-inner">
            <div class="logo-mark">₱</div>
            <div>
                <h1 class="site-title">Expense Tracker</h1>
                <p class="site-sub">Personal Finance Manager</p>
            </div>
        </div>
    </header>

    <main>

        <!-- Add Expense -->
        <section class="card" id="add-section">
            <div class="card-header">
                <span class="card-icon">＋</span>
                <h2>Add Expense</h2>
            </div>

            <form id="frm" autocomplete="off">
                <div class="form-row">
                    <div class="field">
                        <label for="name">Expense Name</label>
                        <input type="text" id="name" placeholder="e.g. Lunch, Grab ride…" required />
                    </div>
                    <div class="field">
                        <label for="amount">Amount (PHP)</label>
                        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" required />
                    </div>
                </div>

                <div class="field">
                    <label for="category">Category</label>
                    <div class="select-wrap">
                        <select id="category">
                            <option value="food">🍱  Food</option>
                            <option value="transport">🚌  Transport</option>
                            <option value="bills">💡  Bills</option>
                            <option value="shopping">🛍️  Shopping</option>
                            <option value="health">💊  Health</option>
                            <option value="others">📦  Others</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn">Add Expense</button>
            </form>
        </section>

        <!-- Stats -->
        <section class="card stats-card" id="stats-section">
            <div class="stat-box">
                <span class="stat-label">Total Spent</span>
                <span class="stat-value" id="totalExp">₱0.00</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <span class="stat-label">Expenses</span>
                <span class="stat-value" id="expCount">0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <span class="stat-label">Highest</span>
                <span class="stat-value" id="highestExp">₱0.00</span>
            </div>
        </section>

        <!-- Summary -->
        <section class="card" id="summary-section">
            <div class="card-header">
                <span class="card-icon">☰</span>
                <h2>Expense Summary</h2>
            </div>

            <div class="toolbar">
                <div class="filter-group">
                    <label for="sort">Filter:</label>
                    <div class="select-wrap sm">
                        <select id="sort">
                            <option value="all">All</option>
                            <option value="food">🍱 Food</option>
                            <option value="transport">🚌 Transport</option>
                            <option value="bills">💡 Bills</option>
                            <option value="shopping">🛍️ Shopping</option>
                            <option value="health">💊 Health</option>
                            <option value="others">📦 Others</option>
                        </select>
                    </div>
                </div>
                <div class="sort-group">
                    <label for="sortOrder">Sort:</label>
                    <div class="select-wrap sm">
                        <select id="sortOrder">
                            <option value="newest">Newest</option>
                            <option value="oldest">Oldest</option>
                            <option value="highest">Highest</option>
                            <option value="lowest">Lowest</option>
                        </select>
                    </div>
                </div>
                <button id="clearAllBtn" class="danger-btn" title="Clear all expenses">🗑 Clear All</button>
            </div>

            <ul id="expenseList">
                <li class="empty-state" id="emptyMsg">
                    <span>No expenses yet.<br>Add your first one above!</span>
                </li>
            </ul>
        </section>

    </main>

    <footer>
        <em>France, Pedro Cassidy, Himodo &copy; 2026</em>
    </footer>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script src="js/script.js"></script>
</body>
</html>
