<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <i class="ti ti-report-money" aria-hidden="true"></i>
      </div>
      <div>
        <h1 class="hd-title">Expense Tracker</h1>
        <p class="hd-sub">Personal Finance Manager</p>
      </div>
    </div>
  </header>

  <main>

    <section class="card" id="add-section">
      <div class="card-header">
        <div class="card-icon-wrap">
          <i class="ti ti-circle-plus" aria-hidden="true"></i>
        </div>
        <h2>Add Expense</h2>
      </div>

      <form id="frm" autocomplete="off">
        <div class="form-row">
          <div class="field">
            <label for="name">Expense Name</label>
            <input type="text" id="name" placeholder="e.g. Lunch, Grab ride…" required />
          </div>
          <div class="field">
            <label for="amount">Amount (₱)</label>
            <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" required />
          </div>
        </div>

        <div class="field">
          <label for="category">Category</label>
          <div class="select-wrap">
            <select id="category">
              <option value="food">Food &amp; Drinks</option>
              <option value="transport">Transport</option>
              <option value="bills">Bills &amp; Utilities</option>
              <option value="shopping">Shopping</option>
              <option value="health">Health</option>
              <option value="others">Others</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <i class="ti ti-plus" aria-hidden="true"></i>
          Add Expense
        </button>
      </form>
    </section>

    <section class="card stats-card" id="stats-section">
      <div class="stat-box">
        <i class="ti ti-wallet stat-icon" aria-hidden="true"></i>
        <span class="stat-label">Total Spent</span>
        <span class="stat-value" id="totalExp">₱0.00</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-box">
        <i class="ti ti-list-numbers stat-icon" aria-hidden="true"></i>
        <span class="stat-label">Expenses</span>
        <span class="stat-value" id="expCount">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-box">
        <i class="ti ti-trending-up stat-icon" aria-hidden="true"></i>
        <span class="stat-label">Highest</span>
        <span class="stat-value" id="highestExp">₱0.00</span>
      </div>
    </section>

    <!-- Summary -->
    <section class="card" id="summary-section">
      <div class="card-header">
        <div class="card-icon-wrap">
          <i class="ti ti-layout-list" aria-hidden="true"></i>
        </div>
        <h2>Expense Summary</h2>
      </div>

      <div class="toolbar">
        <div class="filter-group">
          <span class="toolbar-label">Filter</span>
          <div class="sm-select-wrap">
            <select id="sort">
              <option value="all">All Categories</option>
              <option value="food">Food &amp; Drinks</option>
              <option value="transport">Transport</option>
              <option value="bills">Bills</option>
              <option value="shopping">Shopping</option>
              <option value="health">Health</option>
              <option value="others">Others</option>
            </select>
          </div>
        </div>
        <div class="sort-group">
          <span class="toolbar-label">Sort</span>
          <div class="sm-select-wrap">
            <select id="sortOrder">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="highest">Highest amount</option>
              <option value="lowest">Lowest amount</option>
            </select>
          </div>
        </div>
        <button id="clearAllBtn" class="danger-btn" title="Clear all expenses">
          <i class="ti ti-trash" aria-hidden="true"></i>
          Clear All
        </button>
      </div>

      <ul id="expenseList">
        <li class="empty-state">
          <i class="ti ti-receipt-off" aria-hidden="true"></i>
          No expenses yet.<br />Add your first one above!
        </li>
      </ul>
    </section>

  </main>

  <footer>
    <p>France, Pedro Cassidy, Himodo &copy; 2026</p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <i class="ti ti-check" aria-hidden="true"></i>
    <span id="toastMsg"></span>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
