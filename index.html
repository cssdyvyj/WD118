<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header>
        <main>
            <h1>Personal Expense Tracker</h1>
            <section id="expense">
                <form action="" id="frm">
                    <label>Expense Name:</label>
                    <input type="text" id="name" class="name" placeholder="e.g Lunch"/>
                    <br>
                    <label>Amount:</label>
                    <input type="number" id="amount" class="amount" placeholder="e.g 100"/>
                    <br>
                    <label>Choose Category:</label>
                    <select name="category" id="category">
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="bills">Bills</option>
                        <option value="others">Others</option>
                    </select>
                    <br>
                    <input type="submit" value="Add Expense">
                </form>
            </section>

            <h1>Summary of Expenses</h1>
            <section id="summary">
                <div>
                    <label>Sort by:</label>
                    <select name="sort" id="sort">
                            <option value="all">All</option>
                            <option value="food">Food</option>
                            <option value="transport">Transport</option>
                            <option value="bills">Bills</option>
                            <option value="others">Others</option>
                    </select>
                </div>
                
                <ul id="c">
                    
                </ul>
            </section>

            <h1>Total Expenses</h1>
            <section id="totalExpenses">
                <p id="totalExp">Total Expense: 0.00 PHP</p>
            </section>
        </main>
    </header>

    <footer>
        <em>France, Pedro Cassidy, Himodo &copy; 2026</em>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
